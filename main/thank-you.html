<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Pixel & Proof</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../src/style.css">

  <style>
    /* Fade-in Animation */
    @keyframes revealIn {
      from { 
        opacity: 0; 
        transform: translateY(12px); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }
    
    html {
      background: #020202;
      scroll-behavior: smooth;
    }

    body {
      background: #020202;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    #reveal-wrapper {
      opacity: 0;
      animation: revealIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    #hero-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10001;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
    }

    .main-content {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 140px 24px 60px;
    }

    #hero-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: #FFCE00;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 900;
      color: #020202;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-align: center;
      text-decoration: none;
      transition: transform 0.2s;
    }

    #hero-menu-btn:hover {
      transform: scale(1.08);
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(255, 206, 0, 0.1);
      border: 1px solid rgba(255, 206, 0, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      color: #FFCE00;
    }

    .thank-you-headline {
      font-size: clamp(42px, 10vw, 110px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 32px;
      color: rgba(255, 255, 255, 0.9);
      max-width: 1000px;
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .received-row {
      position: relative;
      /* Optical centering: offset the width of the period */
      margin-right: -0.35em;
    }

    .dot {
      position: absolute;
    }

    .thank-you-sub {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      max-width: 600px;
      margin-bottom: 60px;
      line-height: 1.5;
    }

    .cta-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }

    .primary-cta {
      background: #FFCE00;
      color: #020202;
      padding: 24px 40px;
      border-radius: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 20px 40px rgba(255, 206, 0, 0.1);
    }

    .primary-cta:hover {
      transform: scale(1.02);
    }

    .secondary-link {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-decoration: none;
      transition: color 0.3s;
    }

    .secondary-link:hover {
      color: #FFCE00;
    }

    @media (max-width: 767px) {
      #hero-nav {
        padding: 24px 24px;
      }
      .main-content {
        padding-top: 100px;
      }
    }
  </style>
</head>

<body class="selection:bg-[#FFCE00] selection:text-black overflow-x-hidden">

  <!-- Noise Overlay -->
  <div class="fixed inset-0 w-full h-full pointer-events-none z-[9999] opacity-[0.03] bg-[url('../assets/noise.png')]"></div>

  <div id="reveal-wrapper">
    <!-- Simple Centered Logo -->
    <nav id="hero-nav">
      <a href="index.html" style="display:inline-flex; align-items:center;">
        <img src="../assets/logo_1.PNG" alt="PIXEL & PROOF" style="height:28px; width:auto;">
      </a>
    </nav>

    <!-- Content -->
    <main class="main-content">
      <div class="success-icon">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>

      <h1 class="thank-you-headline">
        <span>Message</span>
        <span class="received-row">Received<span class="dot">.</span></span>
      </h1>

      <p class="thank-you-sub">
        We've received your strategy request. <span style="color: #FFCE00; font-weight: 700;">Pixel & Proof</span> will be in touch within 24 hours. Book your free strategy call below.
      </p>

      <div class="cta-container">
        <a href="https://calendly.com/hello-pixelnproof/30min" target="_blank" class="primary-cta">
          Let's talk on call &rarr;
        </a>
        <a href="index.html" class="secondary-link">Back to Home</a>
      </div>
    </main>

    <!-- Simple Footer -->
    <footer class="py-12 border-t border-white/5">
      <div class="max-w-[1280px] mx-auto text-center px-6">
        <span class="text-[9px] font-black uppercase tracking-[0.3em] text-white/10">
          &copy; 2026 Pixel Proof. All Rights Reserved.
        </span>
      </div>
    </footer>
  </div>

</body>
</html>
